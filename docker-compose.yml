services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: context_engine_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: context_engine_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: context_engine_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: context_engine
      POSTGRES_USER: context_engine
      POSTGRES_PASSWORD: context_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped


volumes:
  qdrant_data:
  redis_data:
  postgres_data:

