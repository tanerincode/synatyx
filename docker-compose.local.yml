services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: context_engine_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: context_engine_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: context_engine_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: context_engine
      POSTGRES_USER: context_engine
      POSTGRES_PASSWORD: context_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context_engine -d context_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build: .
    container_name: synatyx_migrate
    env_file: .env
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: context_engine
      POSTGRES_USER: context_engine
      POSTGRES_PASSWORD: context_engine
      POSTGRES_DSN: postgresql+asyncpg://context_engine:context_engine@postgres:5432/context_engine
    entrypoint: ["alembic", "upgrade", "head"]

  synatyx-gc:
    build: .
    container_name: synatyx_gc
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MODE: gc
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: context_engine
      POSTGRES_USER: context_engine
      POSTGRES_PASSWORD: context_engine
      POSTGRES_DSN: postgresql+asyncpg://context_engine:context_engine@postgres:5432/context_engine
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  qdrant_data:
  redis_data:
  postgres_data:

